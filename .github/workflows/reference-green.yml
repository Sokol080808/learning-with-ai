# Этот workflow живёт ТОЛЬКО в ветке `reference`. На ней лежат ЭТАЛОННЫЕ РЕШЕНИЯ
# (заполненные стабы), поэтому здесь тесты обязаны быть ПОЛНОСТЬЮ ЗЕЛЁНЫМИ. Это доказывает
# две вещи сразу: курс решаем (на правильном коде всё проходит) и новые рандомизированные
# property-тесты валидны (зелёные на эталоне, а не только «красные на стабе»).
#
# В ветке main этого файла НЕТ намеренно: там стабы не заполнены, и «всё зелёное» недостижимо
# by design (courses-ci.yml проверяет main иначе — что скелет лишь компилируется/собирается).
#
# Заполнены эталонами ВСЕ 5 треков: Python (все модули + капстоун), C++ (все 23 модуля; капстоун
# MiniDB — отдельный заход, поэтому исключён), Rust (все 15 модулей + капстоун minidb), Deep Learning
# (18 модулей + капстоун nano-LM, numpy + torch CPU) и CAOS (15 модулей + капстоун Tiny VM, C11/CMake).
name: Reference green

on:
  push:
    branches: [reference]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python (эталон — все тесты зелёные)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Установка (pytest + hypothesis)
        run: python -m pip install -U pip pytest hypothesis
      - name: Все тесты должны пройти на эталонном решении
        run: python -m pytest python -p no:cacheprovider -q

  cpp:
    name: C++ (эталон — все 23 модуля зелёные)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Инструменты
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Сборка + все тесты модулей должны пройти (капстоун пока исключён)
        run: |
          cmake -S cpp -B cpp/build
          cmake --build cpp/build -j"$(nproc)"
          ctest --test-dir cpp/build -LE capstone --output-on-failure -j"$(nproc)"

  rust:
    name: Rust (эталон — все 15 модулей + капстоун зелёные)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Версия тулчейна
        run: cargo --version && rustc --version
      - name: Весь воркспейс должен пройти на эталонном решении
        run: cargo test --workspace --manifest-path rust/Cargo.toml

  deep-learning:
    name: Deep Learning (эталон — 18 модулей + капстоун зелёные)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Установка (numpy/pytest с PyPI, torch — из CPU-индекса)
        run: |
          python -m pip install -U pip numpy pytest
          python -m pip install -U torch --index-url https://download.pytorch.org/whl/cpu
      - name: Все тесты должны пройти на эталонном решении
        run: python -m pytest deep-learning -p no:cacheprovider -q

  caos:
    name: CAOS (эталон — 15 модулей + капстоун Tiny VM зелёные)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Инструменты
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Сборка + все тесты (включая капстоун) должны пройти на эталоне
        run: |
          cmake -S caos -B caos/build
          cmake --build caos/build -j"$(nproc)"
          ctest --test-dir caos/build --output-on-failure -j"$(nproc)"
